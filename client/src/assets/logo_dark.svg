    <path d="M16 9 L16 14 M16 9 L10 5 M16 9 L22 5" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Left Page -->
    <path d="M16 28 C10 28 4 24 4 24 L4 12 C4 12 10 16 16 18 Z" fill="#6366f1" opacity="0.9"/>
    
    <!-- Right Page -->
    <path d="M16 28 C22 28 28 24 28 24 L28 12 C28 12 22 16 16 18 Z" fill="#4f46e5"/>
    
    <!-- Nodes (Glowing structural concept) -->
    <circle cx="16" cy="9" r="2.5" fill="#4f46e5"/>
    <circle cx="10" cy="5" r="2" fill="#6366f1"/>
    <circle cx="22" cy="5" r="2" fill="#6366f1"/>
    
    <!-- Center spine of the book -->
    <line x1="16" y1="18" x2="16" y2="28" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Edunova Text (Dark Mode) -->
  <text x="38" y="18" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#f8fafc" letter-spacing="-0.5" dominant-baseline="central">Edunova</text>
